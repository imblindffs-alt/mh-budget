// ─── SMS PARSER ───────────────────────────────────────────────────────────────
function parseSMS(text, categories) {
  const r = { amount: null, method: null, date: null, notes: null, categoryId: null };
  const am = text.match(/BHD\s*([\d,]+\.[\d]+)/i);
  if (am) r.amount = parseFloat(am[1].replace(/,/g, ""));
  const dm = text.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (dm) r.date = `${dm[3]}-${dm[2]}-${dm[1]}`;
  if (/credit card/i.test(text)) r.method = "Credit Card";
  else if (/fawri|benefitpay|transfer/i.test(text)) r.method = "BenefitPay";
  const mc = text.match(/at\s+([A-Z0-9 &'./-]+?)\s+on\s+\d/i);
  if (mc) r.notes = mc[1].trim();
  if (!r.notes) { const im = text.match(/to IBAN\s+(\*+\d+)/i); if (im) r.notes = `Transfer to ${im[1]}`; }
  if (r.notes) {
    const lower = r.notes.toLowerCase();
    for (const [kw, id] of Object.entries(MERCHANT_CATEGORY_MAP)) {
      if (lower.includes(kw) && categories.find(c => c.id === id)) { r.categoryId = id; break; }
    }
  }
  return r;
}

// ─── CSV EXPORT ───────────────────────────────────────────────────────────────
function exportCSV(transactions, categories, month, year) {
  const txs = transactions.filter(t => { const d = new Date(t.date); return d.getMonth() === month && d.getFullYear() === year; });
  const rows = [["Date","Category","Notes","Method","Amount (BHD)"]];
  txs.forEach(t => { const cat = categories.find(c => c.id === t.categoryId); rows.push([t.date, cat?.name || "", t.notes || "", t.method, t.amount.toFixed(3)]); });
  const csv = rows.map(r => r.join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = `spending-${MONTHS[month]}-${year}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ─── LOCAL STORAGE HOOK ───────────────────────────────────────────────────────
function useLocalStorage(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored !== null ? JSON.parse(stored) : defaultValue;
    } catch { return defaultValue; }
  });
  const set = (updater) => {
    setValue(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  };
  return [value, set];
}

// ─── PIN LOCK ─────────────────────────────────────────────────────────────────
// PIN is never stored in plain text — only its SHA-256 hash is kept.
const DEFAULT_PIN_HASH = "7a8f5f0a390645d2ae9a39b5909abf2ed43df3c0ff83a0733fbbef8f2e05ae78";
const MAX_ATTEMPTS = 5;

async function hashPIN(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function PinLock({ onUnlock, pinHash }) {
  const [input, setInput] = useState("");
  const [attempts, setAttempts] = useState(0);
  const [shake, setShake] = useState(false);
  const [locked, setLocked] = useState(false);
  const [lockTimer, setLockTimer] = useState(0);

  useEffect(() => {
    let interval;
    if (locked && lockTimer > 0) {
      interval = setInterval(() => {
        setLockTimer(t => {
          if (t <= 1) { setLocked(false); setAttempts(0); clearInterval(interval); return 0; }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(interval);
  }, [locked, lockTimer]);

  const handleKey = (digit) => {
    if (locked) return;
    setInput(i => i + digit);
  };

  const handleSubmit = async () => {
    if (locked || input.length === 0) return;
    const hashed = await hashPIN(input);
    if (hashed === pinHash) {
      onUnlock();
    } else {
      const newAttempts = attempts + 1;
      setAttempts(newAttempts);
      setShake(true);
      setTimeout(() => { setShake(false); setInput(""); }, 600);
      if (newAttempts >= MAX_ATTEMPTS) {
        setLocked(true);
        setLockTimer(30);
        setInput("");
      }
    }
  };

  const handleDelete = () => setInput(i => i.slice(0, -1));

  const MAX_DOTS = 20;
  const displayLen = Math.min(Math.max(input.length, 6), MAX_DOTS);
  const dots = Array.from({ length: displayLen }, (_, i) => i < input.length);

  return (
    <div style={{ width: "100%", height: "100%", background: "linear-gradient(180deg,#1C1C2E 0%,#2D2D44 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "SF Pro Text,-apple-system,system-ui,sans-serif" }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>💰</div>
      <div style={{ fontSize: 24, fontWeight: 700, color: "#fff", marginBottom: 6, letterSpacing: -0.5 }}>MH Budget</div>
      <div style={{ fontSize: 13, color: "rgba(255,255,255,0.45)", marginBottom: 40 }}>Enter your passcode</div>

      <div style={{ display: "flex", gap: 6, marginBottom: input.length > MAX_DOTS ? 8 : 48, flexWrap: "wrap", justifyContent: "center", maxWidth: 300, padding: "0 20px", animation: shake ? "shake 0.5s ease" : "none" }}>
        {dots.map((filled, i) => (
          <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", flexShrink: 0, background: filled ? "#00C389" : "rgba(255,255,255,0.2)", transition: "background 0.15s" }} />
        ))}
      </div>
      {input.length > MAX_DOTS && (
        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", marginBottom: 36 }}>{input.length} digits entered</div>
      )}

      {locked ? (
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>🔒</div>
          <div style={{ fontSize: 15, color: "#FF453A", fontWeight: 600 }}>Too many attempts</div>
          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.45)", marginTop: 6 }}>Try again in {lockTimer}s</div>
        </div>
      ) : (
        <>
          {/* Keypad */}
          {[["1","2","3"],["4","5","6"],["7","8","9"],["✓","0","⌫"]].map((row, ri) => (
            <div key={ri} style={{ display: "flex", gap: 20, marginBottom: 16 }}>
              {row.map((k, ki) => (
                <button key={ki}
                  onClick={() => k === "⌫" ? handleDelete() : k === "✓" ? handleSubmit() : handleKey(k)}
                  style={{
                    width: 72, height: 72, borderRadius: 36,
                    border: k === "⌫" ? "none" : k === "✓" ? "none" : "1px solid rgba(255,255,255,0.15)",
                    background: k === "✓" ? (input.length > 0 ? "#00C389" : "rgba(0,195,137,0.2)") : k === "⌫" ? "transparent" : "rgba(255,255,255,0.1)",
                    color: "#fff", fontSize: k === "⌫" ? 22 : k === "✓" ? 26 : 26,
                    fontWeight: k === "✓" ? 700 : 400,
                    cursor: k ? "pointer" : "default",
                    opacity: k === "✓" && input.length === 0 ? 0.3 : 1,
                    transition: "background 0.2s, opacity 0.2s",
                  }}>
                  {k}
                </button>
              ))}
            </div>
          ))}
          {attempts > 0 && <div style={{ fontSize: 12, color: "#FF9F0A", marginTop: 8 }}>{MAX_ATTEMPTS - attempts} attempt{MAX_ATTEMPTS - attempts !== 1 ? "s" : ""} remaining</div>}
        </>
      )}

      <style>{`@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }`}</style>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
export default function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [pinHash, setPinHash] = useLocalStorage("appPinHash", DEFAULT_PIN_HASH);
  const [darkMode, setDarkMode] = useLocalStorage("darkMode", false);
  const [userName, setUserName] = useLocalStorage("userName", "My");
  const [categories, setCategories] = useLocalStorage("categories", DEFAULT_CATEGORIES);
  const [transactions, setTransactions] = useLocalStorage("transactions", SEED_TX);
  const [budgets, setBudgets] = useLocalStorage("budgets", { 4: 80, 5: 50, 6: 280, 9: 40, 8: 100 });
  const [incomeTargets, setIncomeTargets] = useLocalStorage("incomeTargets", { 1: 1200, 2: 300, 3: 100 });
  const [savingsTargets, setSavingsTargets] = useLocalStorage("savingsTargets", { 11: 200 });
  const [selectedMonth, setSelectedMonth] = useState(2);
  const [selectedYear, setSelectedYear] = useState(2026);
  const [showAddTx, setShowAddTx] = useState(false);
  const [showAddMode, setShowAddMode] = useState(false);
  const [showAddCat, setShowAddCat] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [editTx, setEditTx] = useState(null);

  const D = darkMode ? DARK : LIGHT;

  const monthTx = transactions.filter(t => { const d = new Date(t.date); return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear; });
  const totalIncome = Object.values(incomeTargets).reduce((s, v) => s + v, 0);
  const totalExpense = monthTx.filter(t => categories.find(c => c.id === t.categoryId)?.type === "expense").reduce((s, t) => s + t.amount, 0);
  const totalSavingsActual = monthTx.filter(t => categories.find(c => c.id === t.categoryId)?.type === "savings").reduce((s, t) => s + t.amount, 0);
  const totalSavingsGoal = Object.values(savingsTargets).reduce((s, v) => s + v, 0);
  const totalBudget = Object.values(budgets).reduce((s, v) => s + v, 0);
  const balance = totalIncome - totalExpense - totalSavingsActual;

  const expenseByCategory = categories.filter(c => c.type === "expense").map(cat => {
    const spent = monthTx.filter(t => t.categoryId === cat.id).reduce((s, t) => s + t.amount, 0);
    return { ...cat, spent, budget: budgets[cat.id] || 0 };
  }).filter(c => c.spent > 0 || c.budget > 0);

  const savingsByCategory = categories.filter(c => c.type === "savings").map(cat => {
    const saved = monthTx.filter(t => t.categoryId === cat.id).reduce((s, t) => s + t.amount, 0);
    return { ...cat, saved, goal: savingsTargets[cat.id] || 0 };
  }).filter(c => c.saved > 0 || c.goal > 0);

  const alerts = expenseByCategory.filter(c => c.budget > 0 && c.spent / c.budget >= 0.8);

  const trendData = useMemo(() => {
    const res = [];
    for (let i = 5; i >= 0; i--) {
      let m = selectedMonth - i, y = selectedYear;
      if (m < 0) { m += 12; y -= 1; }
      const txs = transactions.filter(t => { const d = new Date(t.date); return d.getMonth() === m && d.getFullYear() === y; });
      const exp = txs.filter(t => categories.find(c => c.id === t.categoryId)?.type === "expense").reduce((s, t) => s + t.amount, 0);
      res.push({ label: MONTHS_SHORT[m], expense: exp, income: Object.values(incomeTargets).reduce((s, v) => s + v, 0) });
    }
    return res;
  }, [selectedMonth, selectedYear, transactions, incomeTargets, categories]);

  const openEdit = (tx) => { setEditTx(tx); setShowAddTx("manual"); };
  const saveTx = (tx) => {
    if (editTx) setTransactions(prev => prev.map(t => t.id === editTx.id ? { ...tx, id: editTx.id } : t));
    else setTransactions(prev => [...prev, { ...tx, id: Date.now() }]);
    setShowAddTx(false); setEditTx(null);
  };

  return (
    <div style={{ ...S.phone, background: D.bg }}>
      {!unlocked && (
        <div style={{ position: "absolute", inset: 0, zIndex: 999, borderRadius: 0, overflow: "hidden" }}>
          <PinLock onUnlock={() => setUnlocked(true)} pinHash={pinHash} />
        </div>
      )}
      <div style={S.screen}>
        {tab === "dashboard"    && <Dashboard    {...{ monthTx, totalIncome, totalExpense, totalBudget, totalSavingsActual, totalSavingsGoal, balance, expenseByCategory, savingsByCategory, categories, selectedMonth, selectedYear, setSelectedMonth, setSelectedYear, incomeTargets, savingsTargets, alerts, trendData, D, userName, onEditTx: openEdit, onSettings: () => setShowSettings(true), onExport: () => exportCSV(transactions, categories, selectedMonth, selectedYear) }} />}
        {tab === "transactions" && <Transactions {...{ transactions: monthTx, categories, selectedMonth, selectedYear, setSelectedMonth, setSelectedYear, D, onEdit: openEdit, onDelete: (id) => setTransactions(prev => prev.filter(t => t.id !== id)) }} />}
        {tab === "analytics"   && <Analytics    {...{ transactions, categories, trendData, selectedMonth, selectedYear, setSelectedMonth, setSelectedYear, incomeTargets, D, onExport: () => exportCSV(transactions, categories, selectedMonth, selectedYear) }} />}
        {tab === "budget"      && <Budget       {...{ categories, budgets, setBudgets, incomeTargets, setIncomeTargets, savingsTargets, setSavingsTargets, D, setCategories, onAddCat: () => setShowAddCat(true) }} />}
      </div>
      <BottomNav tab={tab} setTab={setTab} onAdd={() => { setEditTx(null); setShowAddMode(true); }} D={D} />

      {showAddMode && !editTx && <AddModePicker onManual={() => { setShowAddMode(false); setShowAddTx("manual"); }} onSMS={() => { setShowAddMode(false); setShowAddTx("sms"); }} onClose={() => setShowAddMode(false)} D={D} />}
      {showAddTx   && <AddTransactionModal categories={categories} editTx={editTx} mode={showAddTx} D={D} onClose={() => { setShowAddTx(false); setEditTx(null); }} onSave={saveTx} />}
      {showAddCat  && <AddCategoryModal D={D} onClose={() => setShowAddCat(false)} onSave={(cat) => { setCategories(prev => [...prev, { ...cat, id: Date.now() }]); setShowAddCat(false); }} />}
      {showSettings && <SettingsModal darkMode={darkMode} setDarkMode={setDarkMode} userName={userName} setUserName={setUserName} pinHash={pinHash} setPinHash={setPinHash} onClose={() => setShowSettings(false)} D={D} />}
    </div>
  );
}

function Dashboard({ monthTx, totalIncome, totalExpense, totalBudget, totalSavingsActual, totalSavingsGoal, balance, expenseByCategory, savingsByCategory, categories, selectedMonth, selectedYear, setSelectedMonth, setSelectedYear, incomeTargets, savingsTargets, alerts, trendData, D, userName, onEditTx, onSettings, onExport }) {
  const incomeByCategory = categories.filter(c => c.type === "income").map(cat => ({ ...cat, amount: incomeTargets[cat.id] || 0 })).filter(c => c.amount > 0);
  const maxBar = Math.max(...trendData.map(d => Math.max(d.expense, d.income)), 1);

    <div style={{ ...S.scroll, background: D.bg }}>

            <span style={{ fontSize: 18 }}>{over ? "🚨" : "⚠️"}</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: over ? "#FF453A" : "#FF9F0A" }}>{over ? `Over budget: ${cat.name}` : `Approaching limit: ${cat.name}`}</div>
              <div style={{ fontSize: 11, color: D.subtext, marginTop: 1 }}>{fmt(cat.spent)} spent of {fmt(cat.budget)}</div>
            </div>
          </div>
        );
      })}

// ─── DONUT CHART ──────────────────────────────────────────────────────────────
function DonutChart({ data, total, D }) {
  const size = 130, cx = 65, cy = 65, r = 48, sw = 22;
  const circ = 2 * Math.PI * r;
  let off = 0;
  const slices = data.map(cat => { const pct = total > 0 ? cat.spent / total : 0; const dash = pct * circ; const s = { ...cat, dash, gap: circ - dash, off }; off += dash; return s; });
  return (
    <div style={{ display: "flex", justifyContent: "center", position: "relative" }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={D.barBg} strokeWidth={sw} />
        {slices.map((s, i) => <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={sw} strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={-s.off} />)}
      </svg>
      <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", textAlign: "center" }}>
        <div style={{ fontSize: 10, color: D.subtext }}>TOTAL</div>
        <div style={{ fontSize: 12, fontWeight: 700, color: D.text }}>{fmt(total).replace("BHD ", "")}</div>
      </div>
    </div>
  );
}

// ─── BUDGET ───────────────────────────────────────────────────────────────────
function Budget({ categories, budgets, setBudgets, incomeTargets, setIncomeTargets, savingsTargets, setSavingsTargets, setCategories, onAddCat, D }) {
  const [editB, setEditB] = useState({});
  const [editI, setEditI] = useState({});
  const [editS, setEditS] = useState({});

  const totalInc = categories.filter(c => c.type === "income").reduce((s, cat) => s + (incomeTargets[cat.id] || 0), 0);
  const totalSav = categories.filter(c => c.type === "savings").reduce((s, cat) => s + (savingsTargets[cat.id] || 0), 0);
  const totalExp = Object.values(budgets).reduce((s, v) => s + v, 0);
  const diff = totalInc - totalSav - totalExp;
  const isBalanced = Math.abs(diff) < 0.001;

  return (
    <div style={{ ...S.scroll, background: D.bg }}>
      <div style={{ background: D.headerBg, padding: "20px 20px 24px" }}>
        <div style={{ fontSize: 28, fontWeight: 700, color: "#fff", letterSpacing: -0.5 }}>Budget & Categories</div>
      </div>

      {/* Equation Warning */}
      {!isBalanced && (
        <div style={{ margin: "12px 16px 4px", padding: "12px 14px", borderRadius: 14, background: diff > 0 ? "#FF9F0A15" : "#FF453A15", border: `1px solid ${diff > 0 ? "#FF9F0A50" : "#FF453A50"}`, display: "flex", gap: 10, alignItems: "flex-start" }}>
          <span style={{ fontSize: 18, flexShrink: 0 }}>{diff > 0 ? "⚠️" : "🚨"}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: diff > 0 ? "#FF9F0A" : "#FF453A", marginBottom: 3 }}>
              {diff > 0 ? "Budget not fully allocated" : "Budget exceeds income"}
            </div>
            <div style={{ fontSize: 12, color: D.subtext, lineHeight: 1.5 }}>
              Income ({fmt(totalInc)}) should equal Savings ({fmt(totalSav)}) + Expenses ({fmt(totalExp)}).
            </div>
            <div style={{ fontSize: 12, fontWeight: 600, color: diff > 0 ? "#FF9F0A" : "#FF453A", marginTop: 4 }}>
              {diff > 0 ? `${fmt(diff)} unallocated` : `${fmt(Math.abs(diff))} over income`}
            </div>
          </div>
        </div>
      )}

      {isBalanced && totalInc > 0 && (
        <div style={{ margin: "12px 16px 4px", padding: "10px 14px", borderRadius: 14, background: "#00C38912", border: "1px solid #00C38940", display: "flex", gap: 10, alignItems: "center" }}>
          <span style={{ fontSize: 16 }}>✅</span>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#00C389" }}>Budget is perfectly balanced — Income = Savings + Expenses</div>
        </div>
      )}

function AddTransactionModal({ categories, editTx, mode, onClose, onSave, D }) {
  const [amount, setAmount] = useState(editTx?.amount || "");
  const [categoryId, setCategoryId] = useState(editTx?.categoryId || categories.find(c => c.type === "expense")?.id);
  const [date, setDate] = useState(editTx?.date || today());
  const [notes, setNotes] = useState(editTx?.notes || "");
  const [method, setMethod] = useState(editTx?.method || PAYMENT_METHODS[0]);
  const [smsText, setSmsText] = useState("");
  const [parsed, setParsed] = useState(null);
  const [parseError, setParseError] = useState(false);
  const [showForm, setShowForm] = useState(mode !== "sms");

  const handleParse = () => {
    const r = parseSMS(smsText, categories);
    if (!r.amount) { setParseError(true); return; }
    setParseError(false); setParsed(r);
    if (r.amount) setAmount(r.amount);
    if (r.date) setDate(r.date);
    if (r.method) setMethod(r.method);
    if (r.notes) setNotes(r.notes);
    if (r.categoryId) setCategoryId(r.categoryId);
    setShowForm(true);
  };

  return (
    <div style={S.overlay}>
      <div style={{ ...S.modal, background: D.card }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: D.text }}>{editTx ? "Edit Transaction" : mode === "sms" ? "💬 Paste Bank SMS" : "✏️ Manual Entry"}</div>
          <button onClick={onClose} style={{ fontSize: 24, background: "none", border: "none", cursor: "pointer", color: D.subtext, lineHeight: 1 }}>×</button>
        </div>

        {mode === "sms" && !showForm && (
          <>
            <div style={{ fontSize: 13, color: D.subtext, marginBottom: 10, lineHeight: 1.5 }}>Copy the SMS from your bank and paste it below — the app will extract everything automatically.</div>
            <textarea value={smsText} onChange={e => { setSmsText(e.target.value); setParseError(false); }}
              placeholder={`"Thank you for using credit card... BHD 2.150 at TALABAT on 20/03/2026..."`}
              rows={5} style={{ ...S.input, resize: "none", marginBottom: 12, fontSize: 13, lineHeight: 1.5, background: D.inputBg, borderColor: D.border, color: D.text }} />
            {parseError && <div style={{ fontSize: 12, color: "#FF453A", marginBottom: 10, background: "#FFF2F2", padding: "8px 12px", borderRadius: 10 }}>⚠️ Could not read the SMS. Make sure it's a valid BenefitPay or Credit Card message.</div>}
            <button onClick={handleParse} disabled={!smsText.trim()} style={{ ...S.primaryBtn, opacity: smsText.trim() ? 1 : 0.4 }}>✨ Read SMS & Fill Details</button>
          </>
        )}

        {mode === "sms" && showForm && parsed && (
          <div style={{ background: D.inputBg, border: `1px solid ${D.border}`, borderRadius: 12, padding: "10px 14px", marginBottom: 16, display: "flex", gap: 10, alignItems: "center" }}>
            <span style={{ fontSize: 20 }}>✅</span>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: D.text }}>SMS parsed successfully!</div>
              <div style={{ fontSize: 11, color: D.subtext, marginTop: 1 }}>{parsed.categoryId ? "Category auto-detected. " : ""}Review details below before saving.</div>
            </div>
          </div>
        )}

        {showForm && <>
          <Label D={D}>Amount</Label>
          <div style={{ position: "relative", marginBottom: 14 }}>
            <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#8E8E93", fontSize: 13, fontWeight: 600 }}>BHD</span>
            <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.000"
              style={{ ...S.input, paddingLeft: 48, fontSize: 22, fontWeight: 700, color: D.text, background: D.inputBg, borderColor: D.border }} />
          </div>

          <Label D={D}>Category</Label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
            {categories.filter(c => c.type === "expense" || c.type === "savings").map(cat => (
              <button key={cat.id} onClick={() => setCategoryId(cat.id)}
                style={{ padding: "6px 12px", borderRadius: 20, border: `2px solid ${categoryId === cat.id ? cat.color : "transparent"}`, background: categoryId === cat.id ? cat.color + "22" : D.chipBg, cursor: "pointer", fontSize: 13, fontWeight: categoryId === cat.id ? 700 : 400, color: categoryId === cat.id ? cat.color : D.subtext, display: "flex", alignItems: "center", gap: 4 }}>
                {cat.icon} {cat.name}
              </button>
            ))}
          </div>

          <Label D={D}>Date</Label>
          <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ ...S.input, marginBottom: 14, background: D.inputBg, color: D.text, borderColor: D.border }} />

          <Label D={D}>Payment Method</Label>
          <select value={method} onChange={e => setMethod(e.target.value)} style={{ ...S.input, marginBottom: 14, background: D.inputBg, color: D.text, borderColor: D.border }}>
            {PAYMENT_METHODS.map(m => <option key={m}>{m}</option>)}
          </select>

          <Label D={D}>Notes</Label>
          <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Optional description..." rows={2}
            style={{ ...S.input, resize: "none", marginBottom: 20, background: D.inputBg, color: D.text, borderColor: D.border }} />

          <button onClick={() => (!amount || !categoryId) ? null : onSave({ amount: parseFloat(amount), categoryId, date, notes, method })}
            style={{ ...S.primaryBtn, opacity: (!amount || !categoryId) ? 0.4 : 1 }}>
            {editTx ? "Save Changes" : "Add Transaction"}
          </button>
        </>}
      </div>
    </div>
  );
}

function SettingsModal({ darkMode, setDarkMode, userName, setUserName, pinHash, setPinHash, onClose, D }) {
  const [nameInput, setNameInput] = useState(userName === "My" ? "" : userName);
  const [confirmReset, setConfirmReset] = useState(false);
  const [showChangePIN, setShowChangePIN] = useState(false);
  const [currentPIN, setCurrentPIN] = useState("");
  const [newPIN, setNewPIN] = useState("");
  const [confirmPIN, setConfirmPIN] = useState("");
  const [pinError, setPinError] = useState("");
  const [pinSuccess, setPinSuccess] = useState(false);

  const handleChangePIN = async () => {
    const currentHash = await hashPIN(currentPIN);
    if (currentHash !== pinHash) { setPinError("Current passcode is incorrect."); return; }
    if (newPIN.length < 4) { setPinError("New passcode must be at least 4 digits."); return; }
    if (!/^\d+$/.test(newPIN)) { setPinError("Passcode must contain digits only."); return; }
    if (newPIN !== confirmPIN) { setPinError("New passcodes do not match."); return; }
    const newHash = await hashPIN(newPIN);
    setPinHash(newHash);
    setPinSuccess(true);
    setPinError("");
    setCurrentPIN(""); setNewPIN(""); setConfirmPIN("");
    setTimeout(() => { setPinSuccess(false); setShowChangePIN(false); }, 1500);
  };

  const handleReset = () => {
    localStorage.clear();
    window.location.reload();
  };

  return (
    <div style={S.overlay}>
      <div style={{ ...S.modal, background: D.card }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: D.text }}>⚙️ Settings</div>
          <button onClick={onClose} style={{ fontSize: 24, background: "none", border: "none", cursor: "pointer", color: D.subtext }}>×</button>
        </div>

        <Label D={D}>Your Name</Label>
        <input value={nameInput} onChange={e => setNameInput(e.target.value)} onBlur={() => setUserName(nameInput.trim() || "My")} placeholder="Enter your name"
          style={{ ...S.input, marginBottom: 20, background: D.inputBg, color: D.text, borderColor: D.border }} />

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 0", borderTop: `1px solid ${D.border}`, borderBottom: `1px solid ${D.border}`, marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 600, color: D.text }}>Dark Mode</div>
            <div style={{ fontSize: 12, color: D.subtext, marginTop: 2 }}>Switch to dark theme</div>
          </div>
          <button onClick={() => setDarkMode(d => !d)} style={{ width: 51, height: 31, borderRadius: 16, border: "none", cursor: "pointer", position: "relative", background: darkMode ? "#34C759" : "#E5E5EA", transition: "background 0.3s", flexShrink: 0 }}>
            <div style={{ position: "absolute", top: 3, left: darkMode ? 23 : 3, width: 25, height: 25, borderRadius: 13, background: "#fff", transition: "left 0.25s", boxShadow: "0 1px 4px rgba(0,0,0,0.25)" }} />
          </button>
        </div>

        {/* Change Passcode */}
        <div style={{ marginBottom: 16 }}>
          {!showChangePIN ? (
            <button onClick={() => { setShowChangePIN(true); setPinError(""); setPinSuccess(false); }}
              style={{ width: "100%", padding: "12px", borderRadius: 12, border: `1px solid ${D.border}`, background: "none", cursor: "pointer", fontSize: 14, fontWeight: 600, color: "#007AFF" }}>
              🔑 Change Passcode
            </button>
          ) : pinSuccess ? (
            <div style={{ background: "#EDFAF4", borderRadius: 12, padding: "14px", textAlign: "center" }}>
              <div style={{ fontSize: 22, marginBottom: 4 }}>✅</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#00C389" }}>Passcode updated!</div>
            </div>
          ) : (
            <div style={{ background: D.inputBg, borderRadius: 14, padding: "14px", border: `1px solid ${D.border}` }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: D.text, marginBottom: 12 }}>🔑 Change Passcode</div>
              <div style={{ fontSize: 12, color: D.subtext, marginBottom: 6 }}>Current passcode</div>
              <input type="password" value={currentPIN} onChange={e => { setCurrentPIN(e.target.value); setPinError(""); }}
                placeholder="Enter current passcode"
                style={{ ...S.input, marginBottom: 10, background: D.card, color: D.text, borderColor: D.border, fontSize: 14 }} />
              <div style={{ fontSize: 12, color: D.subtext, marginBottom: 6 }}>New passcode</div>
              <input type="password" value={newPIN} onChange={e => { setNewPIN(e.target.value); setPinError(""); }}
                placeholder="Enter new passcode (digits only)"
                style={{ ...S.input, marginBottom: 10, background: D.card, color: D.text, borderColor: D.border, fontSize: 14 }} />
              <div style={{ fontSize: 12, color: D.subtext, marginBottom: 6 }}>Confirm new passcode</div>
              <input type="password" value={confirmPIN} onChange={e => { setConfirmPIN(e.target.value); setPinError(""); }}
                placeholder="Repeat new passcode"
                style={{ ...S.input, marginBottom: pinError ? 8 : 12, background: D.card, color: D.text, borderColor: pinError ? "#FF453A" : D.border, fontSize: 14 }} />
              {pinError && <div style={{ fontSize: 12, color: "#FF453A", marginBottom: 10 }}>⚠️ {pinError}</div>}
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => { setShowChangePIN(false); setPinError(""); setCurrentPIN(""); setNewPIN(""); setConfirmPIN(""); }}
                  style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: D.chipBg, cursor: "pointer", fontWeight: 600, fontSize: 13, color: D.text }}>Cancel</button>
                <button onClick={handleChangePIN}
                  style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#007AFF,#0055D4)", color: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 13 }}>Update</button>
              </div>
            </div>
          )}
        </div>

        <div style={{ marginBottom: 16 }}>
          {!confirmReset ? (
            <button onClick={() => setConfirmReset(true)}
              style={{ width: "100%", padding: "12px", borderRadius: 12, border: `1px solid ${D.border}`, background: "none", cursor: "pointer", fontSize: 14, fontWeight: 600, color: "#FF453A" }}>
              🗑 Reset All Data
            </button>
          ) : (
            <div style={{ background: "#FFF2F2", borderRadius: 12, padding: "12px 14px" }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#FF453A", marginBottom: 8 }}>This will erase everything. Are you sure?</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setConfirmReset(false)} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: "#E5E5EA", cursor: "pointer", fontWeight: 600, fontSize: 13 }}>Cancel</button>
                <button onClick={handleReset} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: "#FF453A", color: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 13 }}>Yes, Reset</button>
              </div>
            </div>
          )}
        </div>
        <button onClick={onClose} style={S.primaryBtn}>Done</button>
      </div>
    </div>
  );
}

// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
function BottomNav({ tab, setTab, onAdd, D }) {
  const items = [
    { id: "dashboard",    icon: "📊", label: "Overview"  },
    { id: "transactions", icon: "📋", label: "History"   },
    { id: "add",          isAdd: true, label: "Add"      },
    { id: "analytics",    icon: "📈", label: "Analytics" },
    { id: "budget",       icon: "🎯", label: "Budget"    },
  ];
  return (
    <div style={{ height: 84, background: D.navBg, borderTop: `1px solid ${D.border}`, display: "flex", alignItems: "flex-start", padding: "4px 0 0", flexShrink: 0, backdropFilter: "blur(20px)" }}>
      {items.map(item => (
        <button key={item.id} onClick={() => item.isAdd ? onAdd() : setTab(item.id)}
          style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "none", border: "none", cursor: "pointer", padding: "6px 0" }}>
          {item.isAdd
            ? <div style={{ width: 44, height: 44, borderRadius: 22, background: "linear-gradient(135deg,#007AFF,#0040FF)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, color: "#fff", boxShadow: "0 4px 14px rgba(0,122,255,0.4)", marginBottom: 2 }}>+</div>
            : <span style={{ fontSize: 20, marginBottom: 2 }}>{item.icon}</span>}
          <span style={{ fontSize: 9, fontWeight: tab === item.id ? 700 : 400, color: tab === item.id ? "#007AFF" : D.subtext }}>{item.label}</span>
        </button>
      ))}
    </div>
  );
}

function MonthPicker({ selectedMonth, selectedYear, setSelectedMonth, setSelectedYear, light }) {
  const prev = () => { if (selectedMonth === 0) { setSelectedMonth(11); setSelectedYear(y => y - 1); } else setSelectedMonth(m => m - 1); };
  const next = () => { if (selectedMonth === 11) { setSelectedMonth(0); setSelectedYear(y => y + 1); } else setSelectedMonth(m => m + 1); };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
      <button onClick={prev} style={{ background: "none", border: "none", cursor: "pointer", color: light ? "rgba(255,255,255,0.7)" : "#007AFF", fontSize: 20, padding: 0 }}>‹</button>
      <span style={{ fontSize: 14, fontWeight: 600, color: light ? "#fff" : "#1C1C1E", minWidth: 120, textAlign: "center" }}>{MONTHS[selectedMonth]} {selectedYear}</span>
      <button onClick={next} style={{ background: "none", border: "none", cursor: "pointer", color: light ? "rgba(255,255,255,0.7)" : "#007AFF", fontSize: 20, padding: 0 }}>›</button>
    </div>
  );
}

function SectionHeader({ title, D }) {
  return <div style={{ fontSize: 12, fontWeight: 700, color: D.subtext, textTransform: "uppercase", letterSpacing: 0.6, margin: "16px 16px 8px" }}>{title}</div>;
}

function Label({ children, D }) {
  return <div style={{ fontSize: 13, fontWeight: 600, color: D.subtext, marginBottom: 6 }}>{children}</div>;
}

function IconBtn({ icon, onClick }) {
  return <button onClick={onClick} style={{ width: 36, height: 36, borderRadius: 18, background: "rgba(255,255,255,0.15)", border: "none", cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>{icon}</button>;
}

// ─── THEME ────────────────────────────────────────────────────────────────────
const LIGHT = { bg: "#F2F2F7", card: "#fff", text: "#1C1C1E", subtext: "#8E8E93", headerBg: "linear-gradient(180deg,#1C1C2E,#2D2D44)", statusBg: "#1C1C2E", inputBg: "#FAFAFA", border: "#E5E5EA", barBg: "#F2F2F7", chipBg: "#F2F2F7", navBg: "rgba(255,255,255,0.95)" };
const DARK  = { bg: "#000",    card: "#1C1C1E", text: "#fff",    subtext: "#636366", headerBg: "linear-gradient(180deg,#0A0A14,#141420)",  statusBg: "#0A0A14",  inputBg: "#2C2C2E", border: "#3A3A3C", barBg: "#2C2C2E", chipBg: "#2C2C2E", navBg: "rgba(28,28,30,0.97)" };
